app-id: org.kde.iconexplorer
runtime: org.kde.Platform
runtime-version: 6.9
sdk: org.kde.Sdk
command: iconexplorer
copy-icon: true
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.FileManager1
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /mkspecs
modules:
  - name: libplasma
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.0/libplasma-6.5.0.tar.xz
        sha256: bc9f814944731297e17d93d08f1390506c5d9ad55f5a847e0ae50796837b6ce8
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libplasma-$version.tar.xz
  - name: libnl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/thom311/libnl/releases/download/libnl3_11_0/libnl-3.11.0.tar.gz
        sha256: 2a56e1edefa3e68a7c00879496736fdbf62fc94ed3232c0baba127ecfa76874d
        x-checker-data:
          type: anitya
          project-id: 1684
          stable-only: true
          url-template: https://github.com/thom311/libnl/releases/download/libnl${}_${version1}_${version2}/libnl-$version.tar.gz
  - name: lm-sensors
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V3-6-0.tar.gz
        sha256: 0591f9fa0339f0d15e75326d0365871c2d4e2ed8aa1ff759b3a55d3734b7d197
        x-checker-data:
          type: anitya
          project-id: 1831
          stable-only: true
          url-template: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V$version0-$version1-$version2.tar.gz
  - name: libksysguard
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_KAUTH_HELPER=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.0/libksysguard-6.5.0.tar.xz
        sha256: 2f1c93246cdb0578651b708d00fe2b6c0c6411f4a1f2c8464e5aeac816971c85
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libksysguard-$version.tar.xz
  - name: plasma5support
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.0/plasma5support-6.5.0.tar.xz
        sha256: 972a7756e8e21f49a42479d4e0f5beb644f8ffae15da5237764d24dbc509e3da
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma5support-$version.tar.xz
  - name: iconexplorer
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.0/plasma-sdk-6.5.0.tar.xz
        sha256: bc244c3d631735ea68eee425adc7d60b09f17128ba653f7cea303134606bdb81
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma-sdk-$version.tar.xz
      - type: patch
        path: appdata.patch
