app-id: org.kde.iconexplorer
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: iconexplorer
copy-icon: true
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.FileManager1
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /lib/pkgconfig
  - /man
  - /mkspecs
  - /sbin
  - /share/man
  - /share/qlogging-categories6
  - '*.la'
  - '*.a'

modules:
  - name: libplasma
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.7.1/libplasma-6.7.1.tar.xz
        sha256: fac96344e91e22f1acac29f9050f8dccd497a658735733cff90e479cda1bd5b3
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libplasma-$version.tar.xz
  - name: libnl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/thom311/libnl/releases/download/libnl3_11_0/libnl-3.11.0.tar.gz
        sha256: 2a56e1edefa3e68a7c00879496736fdbf62fc94ed3232c0baba127ecfa76874d
        x-checker-data:
          type: anitya
          project-id: 1684
          stable-only: true
          url-template: https://github.com/thom311/libnl/releases/download/libnl${}_${version1}_${version2}/libnl-$version.tar.gz
  - name: lm-sensors
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V3-6-0.tar.gz
        sha256: 0591f9fa0339f0d15e75326d0365871c2d4e2ed8aa1ff759b3a55d3734b7d197
        x-checker-data:
          type: anitya
          project-id: 1831
          stable-only: true
          url-template: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V$version0-$version1-$version2.tar.gz
  - name: libksysguard
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_KAUTH_HELPER=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.5/libksysguard-6.6.5.tar.xz
        sha256: f088854a021028b7b0f6a735c89e9aa53bd13e903af11ed16a49c944e33b00df
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libksysguard-$version.tar.xz
  - name: plasma5support
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.7.1/plasma5support-6.7.1.tar.xz
        sha256: 0670bf42990273fbe6049d136dbd60fd6536509d52955c3804899244b82638e3
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma5support-$version.tar.xz
  - name: iconexplorer
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.7.1/plasma-sdk-6.7.1.tar.xz
        sha256: 440a138709288fe8935028ec28b1de6d1df08ca098facd7b8b8629902b2c64c5
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma-sdk-$version.tar.xz
      - type: patch
        path: appdata.patch
