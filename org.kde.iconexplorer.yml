app-id: org.kde.iconexplorer
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: iconexplorer
copy-icon: true
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.FileManager1
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /lib/pkgconfig
  - /man
  - /mkspecs
  - /sbin
  - /share/man
  - /share/qlogging-categories6
  - '*.la'
  - '*.a'

modules:
  - name: libplasma
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.5/libplasma-6.5.5.tar.xz
        sha256: 7d88f9bd0f90b90f4d2290cd8fa0f37e7af3810a0ed58c7d226a02838ab8a71a
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libplasma-$version.tar.xz
  - name: libnl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/thom311/libnl/releases/download/libnl3_11_0/libnl-3.11.0.tar.gz
        sha256: 2a56e1edefa3e68a7c00879496736fdbf62fc94ed3232c0baba127ecfa76874d
        x-checker-data:
          type: anitya
          project-id: 1684
          stable-only: true
          url-template: https://github.com/thom311/libnl/releases/download/libnl${}_${version1}_${version2}/libnl-$version.tar.gz
  - name: lm-sensors
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V3-6-0.tar.gz
        sha256: 0591f9fa0339f0d15e75326d0365871c2d4e2ed8aa1ff759b3a55d3734b7d197
        x-checker-data:
          type: anitya
          project-id: 1831
          stable-only: true
          url-template: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V$version0-$version1-$version2.tar.gz
  - name: libksysguard
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_KAUTH_HELPER=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.5/libksysguard-6.5.5.tar.xz
        sha256: 22b8e4812b1dfa6aef18f27d2ba66d6d7702b3e4db250cae48ab946196da734d
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libksysguard-$version.tar.xz
  - name: plasma5support
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.5/plasma5support-6.5.5.tar.xz
        sha256: 1a2f3e7ebb85e2a1c54c3aa32b712e8f285289758ba2c8236ec0dc66dd8c5cfd
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma5support-$version.tar.xz
  - name: iconexplorer
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.5.5/plasma-sdk-6.5.5.tar.xz
        sha256: b6dc48520ccda4415b0aa6a66502db7180bcd3e1d8975a5f2040519ef70939c4
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma-sdk-$version.tar.xz
      - type: patch
        path: appdata.patch
