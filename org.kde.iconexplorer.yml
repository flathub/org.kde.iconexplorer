app-id: org.kde.iconexplorer
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: iconexplorer
copy-icon: true
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.FileManager1
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /lib/pkgconfig
  - /man
  - /mkspecs
  - /sbin
  - /share/man
  - /share/qlogging-categories6
  - '*.la'
  - '*.a'

modules:
  - name: libplasma
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.2/libplasma-6.6.2.tar.xz
        sha256: 5e6b889bce201acf7d46bbff1970e6f84a711f44b207fe103aaf37a244da994b
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libplasma-$version.tar.xz
  - name: libnl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/thom311/libnl/releases/download/libnl3_11_0/libnl-3.11.0.tar.gz
        sha256: 2a56e1edefa3e68a7c00879496736fdbf62fc94ed3232c0baba127ecfa76874d
        x-checker-data:
          type: anitya
          project-id: 1684
          stable-only: true
          url-template: https://github.com/thom311/libnl/releases/download/libnl${}_${version1}_${version2}/libnl-$version.tar.gz
  - name: lm-sensors
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V3-6-0.tar.gz
        sha256: 0591f9fa0339f0d15e75326d0365871c2d4e2ed8aa1ff759b3a55d3734b7d197
        x-checker-data:
          type: anitya
          project-id: 1831
          stable-only: true
          url-template: https://github.com/lm-sensors/lm-sensors/archive/refs/tags/V$version0-$version1-$version2.tar.gz
  - name: libksysguard
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_KAUTH_HELPER=OFF
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.2/libksysguard-6.6.2.tar.xz
        sha256: 9fe33cd96ba1e396bed019a8a8364f4a4b87089a13fdeb6d5ec47eca6228936a
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/libksysguard-$version.tar.xz
  - name: plasma5support
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.2/plasma5support-6.6.2.tar.xz
        sha256: 36fe9cfa9744e132b465e86254c64de21d6b540774eb1e4c8b3e2554c4a2ff9e
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma5support-$version.tar.xz
  - name: iconexplorer
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.2/plasma-sdk-6.6.2.tar.xz
        sha256: 0e292d2470222c575fd894e00374aa7bde979cea849c138fa59a702e9f07e9b1
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/plasma-sdk-$version.tar.xz
      - type: patch
        path: appdata.patch
